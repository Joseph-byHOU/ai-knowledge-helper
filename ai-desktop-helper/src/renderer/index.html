<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 桌面学习助手</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">

    <!-- ====== 侧边栏 ====== -->
    <aside class="sidebar">
      <!-- 标题 -->
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">🐱</span>
          <span class="logo-text">Cookie<br><small>AI 学习助手</small></span>
        </div>
      </div>

      <!-- 导航 -->
      <nav class="nav" id="nav">
        <a class="nav-item active" data-view="today" href="#">
          <span class="nav-icon">📰</span> 今日日报
        </a>
        <a class="nav-item" data-view="reports" href="#">
          <span class="nav-icon">📚</span> 历史报告
        </a>
        <a class="nav-item" data-view="console" href="#">
          <span class="nav-icon">⚙️</span> 采集控制台
        </a>
        <a class="nav-item" data-view="about" href="#">
          <span class="nav-icon">ℹ️</span> 关于
        </a>
      </nav>

      <!-- 分类筛选 -->
      <div class="sidebar-section">
        <div class="sidebar-label">分类筛选</div>
        <div class="filter-chips" id="filter-chips">
          <button class="chip active" data-filter="all">全部</button>
        </div>
      </div>

      <!-- 统计 -->
      <div class="sidebar-section" id="stats">
        <div class="sidebar-label">数据统计</div>
        <button class="stat-btn active" data-type="all">全部 <span class="stat-count" id="count-all">0</span></button>
        <button class="stat-btn" data-type="论文">📄 论文 <span class="stat-count" id="count-论文">0</span></button>
        <button class="stat-btn" data-type="产品">🚀 产品 <span class="stat-count" id="count-产品">0</span></button>
        <button class="stat-btn" data-type="视频">📺 视频 <span class="stat-count" id="count-视频">0</span></button>
        <button class="stat-btn" data-type="资讯">📰 资讯 <span class="stat-count" id="count-资讯">0</span></button>
        <button class="stat-btn" data-type="开源项目">⭐ 开源项目 <span class="stat-count" id="count-开源项目">0</span></button>
      </div>

      <!-- AI 配置 -->
      <div class="sidebar-section">
        <div class="sidebar-label">AI 配置</div>
        <div class="ai-config-form">
          <input type="text" class="config-input" id="cfg-baseUrl" placeholder="接口地址 (baseUrl)" spellcheck="false">
          <input type="password" class="config-input" id="cfg-apiKey" placeholder="API Key" spellcheck="false">
          <input type="text" class="config-input" id="cfg-modelName" placeholder="模型名称 (如 gpt-4o)" spellcheck="false">
          <button class="btn btn-sm btn-primary" id="btn-save-config">💾 保存配置</button>
          <span class="config-status" id="config-status"></span>
        </div>
      </div>

      <!-- 底部状态 -->
      <div class="sidebar-footer">
        <span id="status-dot" class="status-dot"></span>
        <span class="status-text" id="status-text">就绪</span>
      </div>
    </aside>

    <!-- ====== 主区域 ====== -->
    <main class="main">

      <!-- 顶部操作栏 -->
      <div class="topbar">
        <div class="topbar-left">
          <button class="btn btn-primary" id="btn-quick-fetch">⚡ 快速采集</button>
          <button class="btn" id="btn-full-collect">📡 全量采集</button>
          <button class="btn" id="btn-gen-report">📝 生成报告</button>
          <button class="btn" id="btn-refresh">🔄 刷新</button>
        </div>
        <div class="topbar-right">
          <span class="topbar-date" id="topbar-date"></span>
        </div>
      </div>

      <!-- 搜索栏 -->
      <div class="searchbar">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" id="search-input" placeholder="搜索本地 AI 资讯...（无结果自动联网抓取）" spellcheck="false">
          <button class="btn btn-search-clear" id="btn-search-clear">✕</button>
        </div>
        <button class="btn btn-primary" id="btn-search-go">搜索</button>
      </div>

      <!-- 可滚动内容区 -->
      <div class="view-scroll" id="view-scroll">

        <!-- 今日日报 -->
        <section class="view active" id="view-today">
          <div class="view-header">
            <h2>📰 今日日报</h2>
            <span class="view-subtitle" id="today-subtitle">加载中...</span>
          </div>
          <div class="news-grid" id="news-grid"></div>
          <div class="empty-state" id="empty-state">
            <div class="empty-icon">📭</div>
            <div class="empty-text">还没有数据呢～</div>
            <div class="empty-hint">点击上方「⚡ 快速采集」获取最新 AI 资讯</div>
          </div>
        </section>

        <!-- 历史报告 -->
        <section class="view" id="view-reports">
          <div class="view-header">
            <h2>📚 历史报告</h2>
          </div>
          <div class="report-list" id="report-list"></div>
        </section>

        <!-- 采集控制台 -->
        <section class="view" id="view-console">
          <div class="view-header">
            <h2>⚙️ 采集控制台</h2>
          </div>
          <div class="console-output" id="console-output">
            <div class="console-welcome">
              <div class="console-cat">🐱</div>
              <div>等待操作... 点击「快速采集」或「全量采集」开始</div>
            </div>
          </div>
          <div class="console-actions">
            <button class="btn btn-sm" id="btn-console-clear">🗑️ 清空</button>
            <button class="btn btn-sm" id="btn-console-scroll">⬇️ 滚动到底</button>
          </div>
        </section>

        <!-- 关于 -->
        <section class="view" id="view-about">
          <div class="view-header">
            <h2>ℹ️ 关于</h2>
          </div>
          <div id="about-content"></div>
        </section>

      </div>
    </main>
  </div>

  <!-- ====== 确认对话框 ====== -->
  <div class="modal-mask" hidden id="modal-mask">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">确认操作</span>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body" id="modal-body">确定要执行此操作吗？</div>
      <div class="modal-footer">
        <button class="btn" id="modal-cancel">取消</button>
        <button class="btn btn-primary" id="modal-confirm">确定</button>
      </div>
    </div>
  </div>

  <!-- ====== 侧滑面板 ====== -->
  <div class="panel-mask" hidden id="panel-mask"></div>
  <div class="slide-panel" hidden id="slide-panel">
    <div class="panel-header">
      <div class="panel-tabs">
        <button class="panel-tab active" data-panel-view="original">📖 原文</button>
        <button class="panel-tab" data-panel-view="interpret">🧠 解读</button>
      </div>
      <button class="panel-close" id="panel-close">✕</button>
    </div>
    <div class="panel-body">
      <div class="panel-view active" id="panel-original">
        <iframe class="original-frame" sandbox="allow-same-origin"></iframe>
      </div>
      <div class="panel-view" id="panel-interpret">
        <div class="interpret-content" id="interpret-content">
          <div class="interpret-waiting">
            <div class="console-cat">🧠</div>
            <div>等待解读...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
